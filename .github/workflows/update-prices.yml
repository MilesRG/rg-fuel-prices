name: Update RG Fuel Prices

on:
  schedule:
    - cron: '0 7,19 * * *'   # Runs at 7am and 7pm UTC every day
  workflow_dispatch:            # Allows manual trigger from GitHub Actions tab

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # Needed to commit the JSON back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest RG fuel prices
        run: python fetch_prices.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/stations.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "Update fuel prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
