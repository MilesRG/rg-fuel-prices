<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RG Fuel Prices — Live Petrol & Diesel Near You</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #22c55e;
      --amber:  #f59e0b;
      --red:    #ef4444;
      --navy:   #0f172a;
      --slate:  #1e293b;
      --mid:    #334155;
      --muted:  #64748b;
      --border: #e2e8f0;
      --bg:     #f8fafc;
      --white:  #ffffff;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--navy) 0%, #1e3a5f 100%);
      color: var(--white);
      padding: 20px 24px 24px;
    }
    .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .logo { font-size: 28px; }
    .brand h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; }
    .brand p  { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; }

    .search-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .search-bar input {
      flex: 1; min-width: 180px; padding: 10px 14px;
      border-radius: 8px; border: none; font-size: 0.95rem;
      background: rgba(255,255,255,0.12); color: white; outline: none;
      transition: background 0.2s;
    }
    .search-bar input::placeholder { color: #94a3b8; }
    .search-bar input:focus { background: rgba(255,255,255,0.2); }

    .btn {
      padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; transition: all 0.2s; white-space: nowrap;
    }
    .btn-primary   { background: #3b82f6; color: white; }
    .btn-primary:hover   { background: #2563eb; }
    .btn-secondary { background: rgba(255,255,255,0.15); color: white; }
    .btn-secondary:hover { background: rgba(255,255,255,0.25); }
    .btn:disabled  { opacity: 0.55; cursor: not-allowed; }

    /* ── Fuel tabs ── */
    .fuel-tabs {
      display: flex; gap: 6px; padding: 16px 24px 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .fuel-tabs::-webkit-scrollbar { display: none; }
    .fuel-tab {
      padding: 8px 18px; border-radius: 20px; border: 2px solid var(--border);
      background: var(--white); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; white-space: nowrap; color: var(--muted);
    }
    .fuel-tab:hover  { border-color: #3b82f6; color: #3b82f6; }
    .fuel-tab.active { background: #3b82f6; border-color: #3b82f6; color: white; }

    /* ── Status bar ── */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; font-size: 0.8rem; color: var(--muted);
      border-bottom: 1px solid var(--border); background: var(--white);
      flex-wrap: wrap; gap: 8px;
    }
    .status-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--green);
      margin-right: 6px; animation: pulse 2s infinite;
    }
    .status-dot.loading { background: var(--amber); animation: spin 1s linear infinite; }
    .status-dot.error   { background: var(--red);   animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes spin  { to{transform:rotate(360deg)} }

    /* ── Summary cards ── */
    .summary {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; padding: 16px 24px;
    }
    .summary-card {
      background: var(--white); border-radius: var(--radius);
      padding: 14px 16px; box-shadow: var(--shadow); text-align: center;
    }
    .summary-card .label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 4px; }
    .summary-card .value { font-size: 1.5rem; font-weight: 800; }
    .summary-card .sub   { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .val-green { color: var(--green); }
    .val-amber { color: var(--amber); }
    .val-red   { color: var(--red);   }

    /* ── Map ── */
    #map {
      height: 400px; margin: 0 24px 16px; border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 24px 12px; flex-wrap: wrap; gap: 8px;
    }
    .filter-bar h2 { font-size: 1rem; font-weight: 700; }
    .filter-group  { display: flex; align-items: center; gap: 8px; }
    .filter-bar select, .filter-bar input[type=range] {
      font-size: 0.8rem; padding: 4px 8px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--white); color: var(--navy); cursor: pointer;
    }
    .filter-bar label { font-size: 0.8rem; color: var(--muted); }
    #radiusVal { font-size: 0.8rem; font-weight: 600; min-width: 40px; }

    /* ── Station list ── */
    .stations { padding: 0 24px 40px; display: flex; flex-direction: column; gap: 10px; }

    .station-card {
      background: var(--white); border-radius: var(--radius); padding: 14px 16px;
      box-shadow: var(--shadow); display: grid; grid-template-columns: auto 1fr auto;
      gap: 12px; align-items: center; border-left: 4px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s; cursor: pointer;
    }
    .station-card:hover    { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
    .station-card.cheapest  { border-left-color: var(--green); }
    .station-card.mid-price { border-left-color: var(--amber); }
    .station-card.priciest  { border-left-color: var(--red);   }

    .rank {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.85rem; flex-shrink: 0;
    }
    .rank-1 { background: #fef9c3; color: #854d0e; }
    .rank-2 { background: #f1f5f9; color: #475569; }
    .rank-3 { background: #fef3c7; color: #92400e; }
    .rank-n { background: #f1f5f9; color: var(--muted); }

    .station-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
    .station-addr { font-size: 0.78rem; color: var(--muted); }
    .station-dist { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }

    .price-badge { text-align: right; flex-shrink: 0; }
    .price-badge .pence { font-size: 1.6rem; font-weight: 900; line-height: 1; }
    .price-badge .unit  { font-size: 0.7rem; color: var(--muted); }
    .price-badge .diff  { font-size: 0.72rem; font-weight: 600; margin-top: 2px; }
    .diff-good { color: var(--green); }
    .diff-bad  { color: var(--red);   }

    .brand-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 5px; vertical-align: middle;
    }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px;
    }
    @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }
    .skeleton-card {
      background: var(--white); border-radius: var(--radius); padding: 14px 16px;
      box-shadow: var(--shadow); display: flex; gap: 12px; align-items: center;
    }

    /* ── Banner ── */
    .banner {
      margin: 0 24px 14px; padding: 12px 16px;
      border-radius: var(--radius); font-size: 0.82rem;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .banner.info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
    .banner-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty .emoji { font-size: 48px; margin-bottom: 12px; }

    footer {
      text-align: center; padding: 20px 24px;
      font-size: 0.75rem; color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: #3b82f6; text-decoration: none; }

    @media (max-width: 480px) {
      header, .fuel-tabs, .summary, .filter-bar, .stations { padding-left: 16px; padding-right: 16px; }
      #map { margin-left: 16px; margin-right: 16px; height: 300px; }
      .banner { margin-left: 16px; margin-right: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">⛽</div>
    <div class="brand">
      <h1>RG Fuel Prices</h1>
      <p>Live petrol &amp; diesel prices across the RG region</p>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by postcode, town or brand (e.g. RG1, Reading, Shell)" />
    <button class="btn btn-secondary" id="nearMeBtn" onclick="APP.findNearMe()">📍 Near Me</button>
  </div>
</header>

<div class="fuel-tabs">
  <button class="fuel-tab active" data-fuel="E10"  onclick="APP.setFuel('E10',  this)">Unleaded (E10)</button>
  <button class="fuel-tab"        data-fuel="B7"   onclick="APP.setFuel('B7',   this)">Diesel (B7)</button>
  <button class="fuel-tab"        data-fuel="E5"   onclick="APP.setFuel('E5',   this)">Super Unleaded</button>
  <button class="fuel-tab"        data-fuel="SDV"  onclick="APP.setFuel('SDV',  this)">Super Diesel</button>
</div>

<div class="status-bar">
  <div><span class="status-dot loading" id="statusDot"></span><span id="statusText">Loading prices…</span></div>
  <div id="lastUpdated"></div>
</div>

<div class="summary" id="summary"></div>
<div id="banner"></div>
<div id="map"></div>

<div class="filter-bar">
  <h2 id="listTitle">Stations</h2>
  <div class="filter-group">
    <label>Radius:</label>
    <input type="range" id="radiusSlider" min="5" max="50" value="50" step="5"
           oninput="document.getElementById('radiusVal').textContent=this.value+'mi'; APP.applyFilters()">
    <span id="radiusVal">50mi</span>
    <label style="margin-left:8px">Sort:</label>
    <select id="sortSelect" onchange="APP.applyFilters()">
      <option value="price">Price ↑</option>
      <option value="brand">Brand A–Z</option>
    </select>
    <span id="listCount" style="color:var(--muted);font-size:0.8rem"></span>
  </div>
</div>

<div class="stations" id="stationList"></div>

<footer>
  Data sourced from <a href="https://checkfuelprices.co.uk" target="_blank">CheckFuelPrices.co.uk</a>
  (powered by the <a href="https://www.gov.uk/guidance/access-fuel-price-data" target="_blank">UK Government Fuel Finder</a>).
  Updated automatically twice daily. Prices in pence per litre.
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const APP = {
  allStations:  [],       // full dataset from JSON
  filtered:     [],       // currently displayed
  markers:      [],
  map:          null,
  selectedFuel: 'E10',
  userLat:      null,
  userLng:      null,

  brandColours: {
    'shell':'#DD1D21','bp':'#009B4E','tesco':'#EE1C25','asda':'#7DC142',
    "sainsbury's":'#F06C00','sainsburys':'#F06C00','esso':'#003087',
    'texaco':'#E31837','morrisons':'#FDB924','co-op':'#00A0DC','coop':'#00A0DC',
    'gulf':'#F7941D','jet':'#E4002B','costco':'#005DAA','certas':'#005FA8',
    'independent':'#6366f1','default':'#94a3b8',
  },

  // ── Boot ─────────────────────────────────────
  async init() {
    this.initMap();
    await this.loadData();
    this.bindSearch();
  },

  initMap() {
    this.map = L.map('map').setView([51.4543, -0.9781], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>', maxZoom: 18,
    }).addTo(this.map);
  },

  // ── Load the static JSON ──────────────────────
  async loadData() {
    this.setStatus('loading', 'Loading price data…');
    this.renderSkeletons();
    try {
      const res  = await fetch('./data/stations.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();

      this.allStations = json.stations || [];
      const updated    = json.updated  || null;

      if (updated) {
        const d = new Date(updated);
        this.setLastUpdated('Last updated: ' + d.toLocaleString('en-GB', {
          day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'
        }));
      }

      if (this.allStations.length === 0) {
        this.setStatus('error', 'No station data available yet — check back soon.');
        this.renderEmpty('Data file is empty. The GitHub Action may not have run yet.');
        return;
      }

      this.setStatus('live', `${this.allStations.length} stations loaded for RG region`);
      this.setBanner('info', 'ℹ️',
        `Showing <strong>${this.allStations.length} stations</strong> across the RG region. ` +
        `Prices updated automatically twice daily. Use <strong>📍 Near Me</strong> to sort by your location.`
      );
      this.applyFilters();

    } catch (err) {
      console.error(err);
      this.setStatus('error', 'Could not load price data.');
      this.renderEmpty('Price data not found. The GitHub Action may not have run yet — check the Actions tab in your repository.');
      this.setBanner('info', '⚙️',
        '<strong>First run:</strong> Go to your GitHub repository → Actions tab → "Update RG Fuel Prices" → ' +
        '"Run workflow" to fetch prices for the first time.'
      );
    }
  },

  // ── Filter & sort ─────────────────────────────
  applyFilters() {
    const fuel     = this.selectedFuel;
    const query    = (document.getElementById('searchInput').value || '').toLowerCase().trim();
    const maxMiles = parseFloat(document.getElementById('radiusSlider').value);
    const sort     = document.getElementById('sortSelect').value;

    let stations = this.allStations.filter(s => s.prices && s.prices[fuel] != null);

    // Search filter
    if (query) {
      stations = stations.filter(s =>
        (s.postcode || '').toLowerCase().includes(query) ||
        (s.address  || '').toLowerCase().includes(query) ||
        (s.brand    || '').toLowerCase().includes(query) ||
        (s.name     || '').toLowerCase().includes(query)
      );
    }

    // Distance filter (only if we have user location)
    if (this.userLat !== null) {
      stations = stations.map(s => ({
        ...s, dist: this.haversine(this.userLat, this.userLng, s.lat, s.lng)
      })).filter(s => s.dist <= maxMiles);
    }

    // Sort
    if (sort === 'price') {
      stations.sort((a, b) => a.prices[fuel] - b.prices[fuel]);
    } else {
      stations.sort((a, b) => (a.brand || '').localeCompare(b.brand || ''));
    }

    this.filtered = stations;
    this.renderAll();
  },

  // ── Render ────────────────────────────────────
  renderAll() {
    const fuel     = this.selectedFuel;
    const stations = this.filtered;
    const prices   = stations.map(s => s.prices[fuel]);
    const avg      = prices.length ? prices.reduce((a,b)=>a+b,0)/prices.length : 0;

    this.renderSummary(prices, avg);
    this.renderMap(avg);
    this.renderList(avg);
  },

  renderSummary(prices, avg) {
    if (!prices.length) { document.getElementById('summary').innerHTML = ''; return; }
    const min = Math.min(...prices), max = Math.max(...prices);
    const fmt = p => p.toFixed(1) + 'p';
    document.getElementById('summary').innerHTML = `
      <div class="summary-card"><div class="label">Cheapest</div><div class="value val-green">${fmt(min)}</div><div class="sub">per litre</div></div>
      <div class="summary-card"><div class="label">Area Average</div><div class="value val-amber">${fmt(avg)}</div><div class="sub">per litre</div></div>
      <div class="summary-card"><div class="label">Most Expensive</div><div class="value val-red">${fmt(max)}</div><div class="sub">per litre</div></div>
      <div class="summary-card"><div class="label">Stations</div><div class="value">${this.filtered.length}</div><div class="sub">shown</div></div>
    `;
  },

  renderMap(avg) {
    this.markers.forEach(m => m.remove());
    this.markers = [];
    if (!this.filtered.length) return;

    const bounds = [];
    this.filtered.forEach((s, i) => {
      if (!s.lat || !s.lng) return;
      const price  = s.prices[this.selectedFuel];
      const colour = this.priceColour(price, avg);
      const icon   = L.divIcon({
        className: '',
        html: `<div style="background:${colour};color:white;border-radius:16px;padding:4px 8px;font-size:12px;font-weight:800;box-shadow:0 2px 6px rgba(0,0,0,.3);white-space:nowrap;border:2px solid white">${price.toFixed(1)}p</div>`,
        iconAnchor: [20, 10],
      });
      const marker = L.marker([s.lat, s.lng], { icon })
        .addTo(this.map)
        .bindPopup(`<strong>${this.esc(s.name)}</strong><br>${this.esc(s.address)}<br><span style="font-size:1.2em;font-weight:bold;color:${colour}">${price.toFixed(1)}p/litre</span>${s.dist ? `<br><small>📍 ${s.dist.toFixed(1)} miles away</small>` : ''}`);
      this.markers.push(marker);
      bounds.push([s.lat, s.lng]);
    });

    if (bounds.length) {
      try { this.map.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 }); } catch {}
    }
  },

  renderList(avg) {
    const fuel   = this.selectedFuel;
    const labels = { E10:'Unleaded (E10)', B7:'Diesel (B7)', E5:'Super Unleaded', SDV:'Super Diesel' };
    document.getElementById('listTitle').textContent = `${labels[fuel] || fuel} Prices`;
    document.getElementById('listCount').textContent = `${this.filtered.length} station${this.filtered.length !== 1 ? 's' : ''}`;

    const el = document.getElementById('stationList');
    if (!this.filtered.length) {
      el.innerHTML = '<div class="empty"><div class="emoji">🔍</div><p>No stations match your search.</p></div>';
      return;
    }

    el.innerHTML = this.filtered.map((s, i) => {
      const price    = s.prices[fuel];
      const diff     = price - avg;
      const diffSign = diff < 0 ? '▼' : '▲';
      const diffCls  = diff < 0 ? 'diff-good' : 'diff-bad';
      const tier     = i === 0 ? 'cheapest' : i === this.filtered.length-1 ? 'priciest' : Math.abs(diff) < 2 ? 'mid-price' : diff < 0 ? 'cheapest' : 'priciest';
      const rankCls  = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-n';
      const rankLbl  = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
      const bKey     = (s.brand||'').toLowerCase().replace(/[^a-z]/g,'');
      const bColour  = this.brandColours[bKey] || this.brandColours.default;
      const distStr  = s.dist ? `📍 ${s.dist.toFixed(1)} miles away` : s.postcode || '';

      return `
        <div class="station-card ${tier}" onclick="APP.focusStation(${i})">
          <div class="rank ${rankCls}">${rankLbl}</div>
          <div>
            <div class="station-name">
              <span class="brand-dot" style="background:${bColour}"></span>${this.esc(s.name)}
            </div>
            <div class="station-addr">${this.esc(s.address)}</div>
            <div class="station-dist">${distStr}</div>
          </div>
          <div class="price-badge">
            <div class="pence" style="color:${this.priceColour(price,avg)}">${price.toFixed(1)}</div>
            <div class="unit">p/litre</div>
            <div class="diff ${diffCls}">${diffSign} ${Math.abs(diff).toFixed(1)}p vs avg</div>
          </div>
        </div>`;
    }).join('');
  },

  renderSkeletons() {
    document.getElementById('summary').innerHTML =
      [1,2,3,4].map(()=>`<div class="summary-card"><div class="skeleton" style="height:60px;border-radius:8px"></div></div>`).join('');
    document.getElementById('stationList').innerHTML =
      [1,2,3,4,5].map(()=>`
        <div class="skeleton-card">
          <div class="skeleton" style="width:32px;height:32px;border-radius:50%"></div>
          <div style="flex:1">
            <div class="skeleton" style="height:14px;margin-bottom:8px;width:60%"></div>
            <div class="skeleton" style="height:11px;width:80%"></div>
          </div>
          <div><div class="skeleton" style="height:32px;width:60px;border-radius:6px"></div></div>
        </div>`).join('');
  },

  renderEmpty(msg) {
    document.getElementById('stationList').innerHTML = `<div class="empty"><div class="emoji">⚙️</div><p>${msg}</p></div>`;
    document.getElementById('summary').innerHTML = '';
  },

  // ── User interactions ─────────────────────────
  findNearMe() {
    if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }
    const btn = document.getElementById('nearMeBtn');
    btn.textContent = '📍 Locating…'; btn.disabled = true;
    navigator.geolocation.getCurrentPosition(
      pos => {
        btn.textContent = '📍 Near Me'; btn.disabled = false;
        this.userLat = pos.coords.latitude;
        this.userLng = pos.coords.longitude;
        document.getElementById('sortSelect').value = 'price';
        document.getElementById('radiusSlider').value = 10;
        document.getElementById('radiusVal').textContent = '10mi';
        this.setBanner('');
        this.applyFilters();
        this.map.setView([this.userLat, this.userLng], 13);
      },
      () => { btn.textContent = '📍 Near Me'; btn.disabled = false; alert('Could not get your location.'); },
      { timeout: 10000 }
    );
  },

  focusStation(index) {
    const s = this.filtered[index];
    if (!s) return;
    this.map.setView([s.lat, s.lng], 15);
    this.markers[index]?.openPopup();
    window.scrollTo({ top: document.getElementById('map').offsetTop - 10, behavior: 'smooth' });
  },

  setFuel(fuel, tabEl) {
    this.selectedFuel = fuel;
    document.querySelectorAll('.fuel-tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
    this.applyFilters();
  },

  bindSearch() {
    let timer;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(timer);
      timer = setTimeout(() => this.applyFilters(), 250);
    });
  },

  // ── Helpers ───────────────────────────────────
  haversine(lat1, lng1, lat2, lng2) {
    const R = 3958.8, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  },

  priceColour(price, avg) {
    if (price <= avg - 1.5) return '#16a34a';
    if (price >= avg + 1.5) return '#dc2626';
    return '#d97706';
  },

  setStatus(type, msg) {
    document.getElementById('statusDot').className = 'status-dot' +
      (type === 'loading' ? ' loading' : type === 'error' ? ' error' : '');
    document.getElementById('statusText').textContent = msg;
  },

  setLastUpdated(when) { document.getElementById('lastUpdated').textContent = when; },

  setBanner(type, icon, msg) {
    const el = document.getElementById('banner');
    if (!type) { el.innerHTML = ''; return; }
    el.innerHTML = `<div class="banner ${type}"><span class="banner-icon">${icon}</span><div>${msg}</div></div>`;
  },

  esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); },
};

document.addEventListener('DOMContentLoaded', () => APP.init());
</script>
