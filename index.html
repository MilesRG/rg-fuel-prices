<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RG Fuel Prices — Live Petrol & Diesel Near You</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #22c55e;
      --amber:  #f59e0b;
      --red:    #ef4444;
      --navy:   #0f172a;
      --slate:  #1e293b;
      --mid:    #334155;
      --muted:  #64748b;
      --border: #e2e8f0;
      --bg:     #f8fafc;
      --white:  #ffffff;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--navy) 0%, #1e3a5f 100%);
      color: var(--white);
      padding: 20px 24px 24px;
    }
    .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .logo { font-size: 28px; }
    .brand h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; }
    .brand p  { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; }

    .search-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .search-bar input {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.12);
      color: white;
      outline: none;
      transition: background 0.2s;
    }
    .search-bar input::placeholder { color: #94a3b8; }
    .search-bar input:focus { background: rgba(255,255,255,0.2); }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: rgba(255,255,255,0.15); color: white; }
    .btn-secondary:hover { background: rgba(255,255,255,0.25); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Fuel tabs ── */
    .fuel-tabs {
      display: flex;
      gap: 6px;
      padding: 16px 24px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .fuel-tabs::-webkit-scrollbar { display: none; }
    .fuel-tab {
      padding: 8px 18px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: var(--white);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      color: var(--muted);
    }
    .fuel-tab:hover { border-color: #3b82f6; color: #3b82f6; }
    .fuel-tab.active { background: #3b82f6; border-color: #3b82f6; color: white; }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      font-size: 0.8rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--white);
      flex-wrap: wrap;
      gap: 8px;
    }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    .status-dot.loading { background: var(--amber); animation: spin 1s linear infinite; border-radius: 50%; }
    .status-dot.error   { background: var(--red); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes spin  { to{transform:rotate(360deg)} }

    /* ── Summary cards ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 16px 24px;
    }
    .summary-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .summary-card .label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 4px; }
    .summary-card .value { font-size: 1.5rem; font-weight: 800; }
    .summary-card .sub   { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .val-green { color: var(--green); }
    .val-amber { color: var(--amber); }
    .val-red   { color: var(--red);   }

    /* ── Map ── */
    #map {
      height: 380px;
      margin: 0 24px 16px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* ── Station list ── */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 24px 12px;
    }
    .list-header h2 { font-size: 1rem; font-weight: 700; }
    .list-header span { font-size: 0.8rem; color: var(--muted); }

    .stations { padding: 0 24px 40px; display: flex; flex-direction: column; gap: 10px; }

    .station-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      border-left: 4px solid transparent;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }
    .station-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
    .station-card.cheapest  { border-left-color: var(--green); }
    .station-card.mid-price { border-left-color: var(--amber); }
    .station-card.priciest  { border-left-color: var(--red);   }

    .rank {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.85rem;
      flex-shrink: 0;
    }
    .rank-1 { background: #fef9c3; color: #854d0e; }
    .rank-2 { background: #f1f5f9; color: #475569; }
    .rank-3 { background: #fef3c7; color: #92400e; }
    .rank-n { background: #f1f5f9; color: var(--muted); }

    .station-info {}
    .station-name  { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
    .station-addr  { font-size: 0.78rem; color: var(--muted); }
    .station-dist  { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }

    .price-badge {
      text-align: right;
      flex-shrink: 0;
    }
    .price-badge .pence { font-size: 1.6rem; font-weight: 900; line-height: 1; }
    .price-badge .unit  { font-size: 0.7rem; color: var(--muted); }
    .price-badge .diff  { font-size: 0.72rem; font-weight: 600; margin-top: 2px; }
    .diff-good  { color: var(--green); }
    .diff-bad   { color: var(--red); }

    /* Brand colour dots */
    .brand-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* ── Skeleton loading ── */
    .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

    .skeleton-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      display: flex; gap: 12px; align-items: center;
    }

    /* ── Banner ── */
    .banner {
      margin: 0 24px 14px;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.82rem;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .banner.info    { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
    .banner.warning { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
    .banner.demo    { background: #f0fdf4; border: 1px solid #bbf7d0; color: #14532d; }
    .banner-icon    { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ── No results ── */
    .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 0.95rem; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px 24px;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: #3b82f6; text-decoration: none; }

    @media (max-width: 480px) {
      header { padding: 16px; }
      .fuel-tabs, .summary, .list-header, .stations { padding-left: 16px; padding-right: 16px; }
      #map { margin-left: 16px; margin-right: 16px; height: 300px; }
      .banner { margin-left: 16px; margin-right: 16px; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-top">
    <div class="logo">⛽</div>
    <div class="brand">
      <h1>RG Fuel Prices</h1>
      <p>Live petrol &amp; diesel prices across the RG region</p>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="postcodeInput" placeholder="Enter postcode or area (e.g. RG1, Reading, Basingstoke)" value="RG1" />
    <button class="btn btn-primary" onclick="APP.searchByPostcode()">Search</button>
    <button class="btn btn-secondary" id="nearMeBtn" onclick="APP.findNearMe()">📍 Near Me</button>
  </div>
</header>

<!-- ── Fuel type tabs ── -->
<div class="fuel-tabs">
  <button class="fuel-tab active" data-fuel="E10"  onclick="APP.setFuel('E10', this)">Unleaded (E10)</button>
  <button class="fuel-tab"        data-fuel="B7"   onclick="APP.setFuel('B7',  this)">Diesel (B7)</button>
  <button class="fuel-tab"        data-fuel="E5"   onclick="APP.setFuel('E5',  this)">Super Unleaded</button>
  <button class="fuel-tab"        data-fuel="SDV"  onclick="APP.setFuel('SDV', this)">Super Diesel</button>
</div>

<!-- ── Status bar ── -->
<div class="status-bar">
  <div><span class="status-dot" id="statusDot"></span><span id="statusText">Loading prices…</span></div>
  <div id="lastUpdated"></div>
</div>

<!-- ── Summary row ── -->
<div class="summary" id="summary"></div>

<!-- ── Banner ── -->
<div id="banner"></div>

<!-- ── Map ── -->
<div id="map"></div>

<!-- ── Station list ── -->
<div class="list-header">
  <h2 id="listTitle">Stations</h2>
  <span id="listCount"></span>
</div>
<div class="stations" id="stationList"></div>

<footer>
  Data sourced from <a href="https://checkfuelprices.co.uk" target="_blank">CheckFuelPrices.co.uk</a>,
  powered by the <a href="https://www.gov.uk/guidance/access-fuel-price-data" target="_blank">UK Government Fuel Finder scheme</a>.
  Prices updated within 30 minutes of forecourt changes.
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ─────────────────────────────────────────────
//  APP
// ─────────────────────────────────────────────
const APP = {
  map: null,
  markers: [],
  selectedFuel: 'E10',
  stations: [],
  currentLat: 51.4543,
  currentLng: -0.9781,
  locationLabel: 'Reading (RG1)',
  usingDemoData: false,

  // Brand colours
  brandColours: {
    'shell':        '#DD1D21',
    'bp':           '#009B4E',
    'tesco':        '#EE1C25',
    'asda':         '#7DC142',
    "sainsbury's":  '#F06C00',
    'sainsburys':   '#F06C00',
    'esso':         '#003087',
    'texaco':       '#E31837',
    'morrisons':    '#FDB924',
    'co-op':        '#00A0DC',
    'coop':         '#00A0DC',
    'gulf':         '#F7941D',
    'jet':          '#E4002B',
    'murco':        '#003087',
    'certas':       '#005FA8',
    'costco':       '#005DAA',
    'independent':  '#6366f1',
    'default':      '#94a3b8',
  },

  // ── Initialise ──────────────────────────────
  init() {
    this.initMap();
    this.loadStations(this.currentLat, this.currentLng);
  },

  initMap() {
    this.map = L.map('map').setView([this.currentLat, this.currentLng], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
      maxZoom: 18,
    }).addTo(this.map);
  },

  // ── Load stations ────────────────────────────
  async loadStations(lat, lng) {
    this.setStatus('loading', 'Fetching live prices…');
    this.renderSkeletons();
    this.setBanner('');

    const fuel = this.selectedFuel;
    const url  = `https://checkfuelprices.co.uk/api/widget/stations?lat=${lat}&lng=${lng}&fuel=${fuel}`;

    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const raw = await res.json();
      this.stations = this.parseStations(raw);
      this.usingDemoData = false;

      if (this.stations.length === 0) {
        this.setStatus('error', 'No stations found in this area.');
        this.renderEmpty('No stations found — try a different postcode.');
        return;
      }

      this.renderAll();
      this.setStatus('live', `${this.stations.length} stations loaded`);
      this.setLastUpdated('Just now');

    } catch (err) {
      console.warn('API error:', err.message);
      // Fall back to demo data so the user can still see the UI
      this.stations = this.demoData();
      this.usingDemoData = true;
      this.renderAll();
      this.setStatus('error', 'Using demo data (API unreachable from this browser)');
      this.setBanner('demo',
        '🧪',
        '<strong>Demo mode:</strong> Could not reach the CheckFuelPrices API from this file. ' +
        'This is a CORS restriction when opening the file locally. When hosted on a server the live prices will load automatically. ' +
        'Prices shown below are illustrative examples for the RG area.'
      );
    }
  },

  // ── Parse flexible API responses ─────────────
  parseStations(raw) {
    let list = Array.isArray(raw) ? raw : (raw.stations || raw.data || raw.results || []);
    return list.map(s => {
      const price = this.extractPrice(s);
      return {
        brand:    (s.brand || s.retailer_name || s.site_brand || 'Independent').trim(),
        name:     (s.site_name || s.name || s.brand || 'Station').trim(),
        address:  this.buildAddress(s),
        postcode: s.postcode || s.post_code || '',
        lat:      parseFloat(s.lat || s.latitude  || (s.location && s.location.lat) || 0),
        lng:      parseFloat(s.lng || s.longitude || (s.location && s.location.lng) || 0),
        distance: parseFloat(s.distance || s.distance_miles || s.dist || 0),
        price,
        updated:  s.last_updated || s.updated || s.price_updated || null,
      };
    })
    .filter(s => s.price !== null && s.lat && s.lng)
    .sort((a, b) => a.price - b.price);
  },

  extractPrice(s) {
    const fuel = this.selectedFuel;
    // Direct field
    if (s[fuel] !== undefined && s[fuel] !== null) return parseFloat(s[fuel]);
    // Nested prices object
    if (s.prices && s.prices[fuel] !== undefined) return parseFloat(s.prices[fuel]);
    // Lowercase
    const fl = fuel.toLowerCase();
    if (s[fl] !== undefined) return parseFloat(s[fl]);
    return null;
  },

  buildAddress(s) {
    const parts = [
      s.address || s.street_address || s.street || '',
      s.town || s.city || '',
      s.postcode || s.post_code || '',
    ].filter(Boolean);
    return parts.join(', ') || 'Address unavailable';
  },

  // ── Render helpers ───────────────────────────
  renderAll() {
    const avg   = this.average(this.stations.map(s => s.price));
    const min   = this.stations[0]?.price;
    const max   = this.stations[this.stations.length - 1]?.price;

    this.renderSummary(min, avg, max);
    this.renderMap();
    this.renderList(avg);
  },

  renderSummary(min, avg, max) {
    const fmt = p => p ? `${p.toFixed(1)}p` : '—';
    document.getElementById('summary').innerHTML = `
      <div class="summary-card">
        <div class="label">Cheapest</div>
        <div class="value val-green">${fmt(min)}</div>
        <div class="sub">per litre</div>
      </div>
      <div class="summary-card">
        <div class="label">Area Average</div>
        <div class="value val-amber">${fmt(avg)}</div>
        <div class="sub">per litre</div>
      </div>
      <div class="summary-card">
        <div class="label">Most Expensive</div>
        <div class="value val-red">${fmt(max)}</div>
        <div class="sub">per litre</div>
      </div>
      <div class="summary-card">
        <div class="label">Stations</div>
        <div class="value">${this.stations.length}</div>
        <div class="sub">within range</div>
      </div>
    `;
  },

  renderMap() {
    // Clear old markers
    this.markers.forEach(m => m.remove());
    this.markers = [];

    if (!this.stations.length) return;

    const avg = this.average(this.stations.map(s => s.price));
    const bounds = [];

    this.stations.forEach((s, i) => {
      const colour = this.priceColour(s.price, avg);
      const icon   = L.divIcon({
        className: '',
        html: `<div style="
          background:${colour};
          color:white;
          border-radius:16px;
          padding:4px 8px;
          font-size:12px;
          font-weight:800;
          box-shadow:0 2px 6px rgba(0,0,0,.3);
          white-space:nowrap;
          border:2px solid white;
        ">${s.price.toFixed(1)}p</div>`,
        iconAnchor: [20, 10],
      });

      const marker = L.marker([s.lat, s.lng], { icon })
        .addTo(this.map)
        .bindPopup(`
          <strong>${this.escHtml(s.name)}</strong><br>
          ${this.escHtml(s.address)}<br>
          <span style="font-size:1.2em;font-weight:bold;color:${colour}">${s.price.toFixed(1)}p/litre</span><br>
          <small>${this.selectedFuel} · ${s.distance ? s.distance.toFixed(1) + ' miles away' : ''}</small>
        `);

      this.markers.push(marker);
      bounds.push([s.lat, s.lng]);
    });

    if (bounds.length) {
      try { this.map.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 }); }
      catch {}
    }
  },

  renderList(avg) {
    const fuel = this.selectedFuel;
    const label = { E10: 'Unleaded (E10)', B7: 'Diesel (B7)', E5: 'Super Unleaded', SDV: 'Super Diesel' };
    document.getElementById('listTitle').textContent  = `${label[fuel] || fuel} Prices`;
    document.getElementById('listCount').textContent  = `${this.stations.length} station${this.stations.length !== 1 ? 's' : ''}`;

    const el = document.getElementById('stationList');
    if (!this.stations.length) { el.innerHTML = ''; return; }

    if (!avg) avg = this.average(this.stations.map(s => s.price));

    el.innerHTML = this.stations.map((s, i) => {
      const diff     = s.price - avg;
      const diffSign = diff < 0 ? '▼' : '▲';
      const diffCls  = diff < 0 ? 'diff-good' : 'diff-bad';
      const diffStr  = `${diffSign} ${Math.abs(diff).toFixed(1)}p vs avg`;

      const tier = i === 0                            ? 'cheapest'
                 : i === this.stations.length - 1     ? 'priciest'
                 : Math.abs(diff) < 2                 ? 'mid-price'
                 : diff < 0                           ? 'cheapest'
                 :                                      'priciest';

      const rankCls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-n';
      const rankLbl = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;

      const brandKey   = s.brand.toLowerCase().replace(/[^a-z]/g, '');
      const brandColor = this.brandColours[brandKey] || this.brandColours.default;

      return `
        <div class="station-card ${tier}" onclick="APP.focusStation(${i})">
          <div class="rank ${rankCls}">${rankLbl}</div>
          <div class="station-info">
            <div class="station-name">
              <span class="brand-dot" style="background:${brandColor}"></span>
              ${this.escHtml(s.name)}
            </div>
            <div class="station-addr">${this.escHtml(s.address)}</div>
            <div class="station-dist">${s.distance ? `📍 ${s.distance.toFixed(1)} miles away` : ''}</div>
          </div>
          <div class="price-badge">
            <div class="pence" style="color:${this.priceColour(s.price, avg)}">${s.price.toFixed(1)}</div>
            <div class="unit">p/litre</div>
            <div class="diff ${diffCls}">${diffStr}</div>
          </div>
        </div>
      `;
    }).join('');
  },

  renderSkeletons() {
    document.getElementById('summary').innerHTML = `
      ${[1,2,3,4].map(() => `<div class="summary-card"><div class="skeleton" style="height:60px;border-radius:8px"></div></div>`).join('')}
    `;
    document.getElementById('stationList').innerHTML = `
      ${[1,2,3,4,5].map(() => `
        <div class="skeleton-card">
          <div class="skeleton" style="width:32px;height:32px;border-radius:50%"></div>
          <div style="flex:1">
            <div class="skeleton" style="height:14px;margin-bottom:8px;width:60%"></div>
            <div class="skeleton" style="height:11px;width:80%"></div>
          </div>
          <div style="text-align:right">
            <div class="skeleton" style="height:32px;width:60px;border-radius:6px"></div>
          </div>
        </div>
      `).join('')}
    `;
  },

  renderEmpty(msg) {
    document.getElementById('stationList').innerHTML = `
      <div class="empty">
        <div class="emoji">🔍</div>
        <p>${msg}</p>
      </div>
    `;
    document.getElementById('summary').innerHTML = '';
  },

  // ── User interactions ────────────────────────
  async searchByPostcode() {
    const raw = document.getElementById('postcodeInput').value.trim();
    if (!raw) return;

    this.setStatus('loading', `Geocoding "${raw}"…`);
    this.locationLabel = raw.toUpperCase();

    try {
      const geoUrl = `https://api.postcodes.io/postcodes/${encodeURIComponent(raw.replace(/\s/g,''))}`;
      const res    = await fetch(geoUrl, { signal: AbortSignal.timeout(5000) });
      const data   = await res.json();

      if (data.status === 200 && data.result) {
        this.currentLat   = data.result.latitude;
        this.currentLng   = data.result.longitude;
        this.locationLabel = raw.toUpperCase();
        this.map.setView([this.currentLat, this.currentLng], 12);
        this.loadStations(this.currentLat, this.currentLng);
      } else {
        // Try as a town name with Nominatim
        await this.geocodeByName(raw);
      }
    } catch {
      await this.geocodeByName(raw);
    }
  },

  async geocodeByName(query) {
    try {
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ', UK')}&format=json&limit=1`;
      const res = await fetch(url, { signal: AbortSignal.timeout(5000) });
      const arr = await res.json();
      if (arr && arr.length) {
        this.currentLat = parseFloat(arr[0].lat);
        this.currentLng = parseFloat(arr[0].lon);
        this.map.setView([this.currentLat, this.currentLng], 12);
        this.loadStations(this.currentLat, this.currentLng);
      } else {
        this.setStatus('error', 'Location not found. Try a postcode like RG1 or RG21.');
      }
    } catch {
      this.setStatus('error', 'Could not geocode location. Please try a full postcode.');
    }
  },

  findNearMe() {
    const btn = document.getElementById('nearMeBtn');
    if (!navigator.geolocation) {
      alert('Geolocation is not supported by your browser.');
      return;
    }
    btn.textContent = '📍 Locating…';
    btn.disabled = true;
    navigator.geolocation.getCurrentPosition(
      pos => {
        btn.textContent = '📍 Near Me';
        btn.disabled = false;
        this.currentLat   = pos.coords.latitude;
        this.currentLng   = pos.coords.longitude;
        this.locationLabel = 'Your Location';
        document.getElementById('postcodeInput').value = 'Your Location';
        this.map.setView([this.currentLat, this.currentLng], 13);
        this.loadStations(this.currentLat, this.currentLng);
      },
      err => {
        btn.textContent = '📍 Near Me';
        btn.disabled = false;
        alert('Could not get your location. Please enter a postcode instead.');
      },
      { timeout: 10000 }
    );
  },

  setFuel(fuel, tabEl) {
    this.selectedFuel = fuel;
    document.querySelectorAll('.fuel-tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
    this.loadStations(this.currentLat, this.currentLng);
  },

  focusStation(index) {
    const s = this.stations[index];
    if (!s) return;
    this.map.setView([s.lat, s.lng], 15);
    this.markers[index]?.openPopup();
    window.scrollTo({ top: document.getElementById('map').offsetTop - 10, behavior: 'smooth' });
  },

  // ── Status helpers ───────────────────────────
  setStatus(type, msg) {
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    dot.className  = 'status-dot' + (type === 'loading' ? ' loading' : type === 'error' ? ' error' : '');
    text.textContent = msg;
  },

  setLastUpdated(when) {
    document.getElementById('lastUpdated').textContent = `Updated: ${when}`;
  },

  setBanner(type, icon, msg) {
    const el = document.getElementById('banner');
    if (!type) { el.innerHTML = ''; return; }
    el.innerHTML = `<div class="banner ${type}"><span class="banner-icon">${icon}</span><div>${msg}</div></div>`;
  },

  // ── Utilities ────────────────────────────────
  average(nums) {
    if (!nums.length) return 0;
    return nums.reduce((a, b) => a + b, 0) / nums.length;
  },

  priceColour(price, avg) {
    if (price <= avg - 1.5) return '#16a34a'; // green
    if (price >= avg + 1.5) return '#dc2626'; // red
    return '#d97706';                          // amber
  },

  escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  },

  // ── Demo / fallback data ─────────────────────
  demoData() {
    const fuel = this.selectedFuel;
    const basePrices = { E10: 143, B7: 148, E5: 153, SDV: 158 };
    const base = basePrices[fuel] || 143;

    return [
      { brand:'Asda',        name:'Asda Superstore',      address:'Rose Kiln Lane, Reading',       postcode:'RG2 0SL', lat:51.4378, lng:-0.9724, distance:1.2, price: base - 3.0 },
      { brand:'Tesco',       name:'Tesco Extra',           address:'Peel Centre, Reading',          postcode:'RG2 0FL', lat:51.4401, lng:-0.9811, distance:1.5, price: base - 2.1 },
      { brand:'Morrisons',   name:'Morrisons Reading',     address:'Kenavon Drive, Reading',        postcode:'RG1 3HW', lat:51.4582, lng:-0.9714, distance:0.4, price: base - 1.8 },
      { brand:"Sainsbury's", name:"Sainsbury's Reading",   address:'Brunel Road, Reading',          postcode:'RG1 8DB', lat:51.4549, lng:-0.9668, distance:0.8, price: base - 0.9 },
      { brand:'BP',          name:'BP Reading West',       address:'Oxford Road, Reading',          postcode:'RG30 1AF',lat:51.4602, lng:-1.0001, distance:1.9, price: base + 0.5 },
      { brand:'Shell',       name:'Shell Reading Central', address:'Caversham Road, Reading',       postcode:'RG1 8AB', lat:51.4621, lng:-0.9738, distance:1.1, price: base + 1.2 },
      { brand:'Esso',        name:'Esso Wokingham Road',   address:'Wokingham Road, Reading',       postcode:'RG6 1LH', lat:51.4490, lng:-0.9558, distance:2.3, price: base + 1.8 },
      { brand:'Gulf',        name:'Gulf Service Station',  address:'Bath Road, Reading',            postcode:'RG30 2BE',lat:51.4488, lng:-1.0051, distance:2.8, price: base + 2.4 },
      { brand:'Texaco',      name:'Texaco Whitley',        address:'Basingstoke Road, Reading',     postcode:'RG2 0JD', lat:51.4295, lng:-0.9762, distance:2.0, price: base + 3.1 },
    ].sort((a, b) => a.price - b.price);
  },
};

// ── Boot ─────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => APP.init());
document.getElementById('postcodeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') APP.searchByPostcode();
});
</script>
